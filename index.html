        .has-bg .cell, .has-bg .empty-cell { background: rgba(255, 255, 255, 0.2) !important; border-color: rgba(238, 238, 238, 0.6) !important; }

        .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; border: 1px solid #eee; width: 100%; }
        .cell, .empty-cell { background: white; padding: 2px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; box-sizing: border-box; }

        /* 针对 .ym-day 的原始设计完全保留 */
.ym-day { 
    font-size: 8px; 
    text-align: center; 
    height: 12px; 
    color: #718096; 
    position: relative; 
    line-height: 9px; 
}

/* 1. 【悬浮增强】让圆点既不沉重，又能从背景中跳出来 */
.dot-mark {
    position: absolute;
    top: 9px; 
    left: 50%;
    transform: translateX(-50%);
    
    width: 4px;       /* 严格保持你的 4px */
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;

    /* 还原最纯正的颜色 */
    filter: none !important;
    border: none !important;

    /* --- 核心：双重柔和投影 --- */
    /* 第一层：0.5px 的半透明深色边缘，负责清晰度 */
    /* 第二层：2px 的扩散淡影，负责浮空感 */
    box-shadow: 
        0 0 1px 0.2px rgba(0, 0, 0, 0.4), 
        0 1px 2px rgba(0, 0, 0, 0.25) !important;
    
    opacity: 1 !important;
}

/* 2. 【图标悬浮版】针对 Emoji 或 SVG */
.dot-mark:not(:empty) {
    width: auto;
    height: auto;
    background: transparent !important;
    box-shadow: none !important; /* 彻底移除容器层面的硬阴影 */
    
    font-size: 6.5px; 
    top: 7.3px; 
    line-height: 1;
    transform: translateX(-50%) scale(0.78); 
    
    /* --- 核心：轻量级悬浮阴影 --- */
    /* 这里的 0.35 是透明度，你可以根据感觉微调 */
    /* 0.5px 的模糊度会让图标边缘看起来很柔和，不生硬 */
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35)) !important;
    
    -webkit-font-smoothing: antialiased;
}

#modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }

/* 【新增】仅针对背景层应用动态滤镜，不影响 body 及弹窗 */
/* 【修改】确保 CSS 变量能直接控制背景层，且不影响其他元素 */
#bg-layer {
    /* 使用 !important 防止被月视图的内联样式或旧样式覆盖 */
    filter: blur(var(--bg-blur, 0px)) brightness(var(--bg-bright, 1)) !important;
    -webkit-filter: blur(var(--bg-blur, 0px)) brightness(var(--bg-bright, 1)) !important;
    transition: filter 0.3s ease;
}

/* 再次确认：保护 body 不被整体模糊 */
#body-tag {
    filter: none !important;
}

/* 【新增】强制 body 不应用滤镜，防止弹窗变糊 */
#body-tag {
    filter: none !important;
}

/* 【新增】确保年份标题在最上层，方便长按 */
.year-header, #year-title {
    cursor: pointer;
    position: relative;
    z-index: 10;
}

/* 1. 方块基础样式：这里只用一个最简单的变量控制背景 */
.year-month-card { 
    /* 我们统一用 --year-card-bg 这个变量名 */
    background-color: var(--year-card-bg, rgba(255, 255, 255, 0.2)) !important;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    transition: background-color 0.3s ease;
}

/* 2. 文字颜色控制 */
.year-month-card .month-name, 
.year-month-card div {
    color: var(--year-text-color, #333);
}

/* 3. 【核心修正】只让背景容器透明，严禁触碰圆点 */
/* 这一行会把方块里原本可能存在的白色块去掉，但不影响带 'dot' 的元素 */
.year-month-card > div *:not([class*="dot"]):not([class*="mark"]) {
    background-color: transparent !important;
}

/* 4. 【圆点增强】让圆点变厚重，一眼就能看到 */
#year-view-container [class*="dot"], 
#year-view-container [class*="mark"] {
    background-color: inherit !important; /* 强制保留圆点自己的打卡色 */
    opacity: 1 !important;
    visibility: visible !important;
    /* 增加深色投影和微小白边，确保在任何背景下都不消失 */
    box-shadow: 0 0 0 1px white, 0 1px 3px rgba(0,0,0,0.8) !important;
    z-index: 5;
    /* 稍微加厚一点颜色感 */
    filter: brightness(0.9) contrast(1.2);
}

        function getLunar(y, m, d) {
            const dateObj = new Date(y, m, d);
            const lunar = new Intl.DateTimeFormat('zh-u-ca-chinese', {day:'numeric'}).format(dateObj);
            if (lunar === '1日') return new Intl.DateTimeFormat('zh-u-ca-chinese', {month:'long'}).format(dateObj);
            const num = parseInt(lunar), units = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
            if (num <= 10) return "初" + units[num];
            if (num < 20) return "十" + units[num % 10];
            if (num === 20) return "二十";
            if (num < 30) return "廿" + units[num % 10];
            return "三十";

    r.readAsDataURL(file);
    r.onload = ev => {

        img.src = ev.target.result;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const maxW = 1920; 
            const scale = Math.min(1, maxW / img.width);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            // --- 这里就是你关心的【格式与质量】判断 ---
            // 如果是 PNG 则用 image/png 导出，否则统一用 image/jpeg
            const outputMime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
            
            canvas.toBlob(blob => {
                uploadProcess(blob, fileName, outputMime, bgId);

// 【新增函数 1】年背景专用上传逻辑
async function changeYearBg() {
    const pass = sessionStorage.getItem('admin_temp_pass');
    if (!pass) return alert("请先解锁");

    const i = document.createElement("input");
    i.type = "file"; i.accept = "image/*";
    i.onchange = async e => {
        const file = e.target.files[0];
        if (!file) return;

        // 这里的 ID 永远带 _year 后缀，不会和 1 月份冲突
        const bgId = `bg_${currentDate.getFullYear()}_year`;
        const extension = file.type === 'image/gif' ? 'gif' : 'jpg';
        const fileName = `${bgId}_${Date.now()}.${extension}`;

        const btn = document.getElementById('yearUploadBtn');
        btn.innerText = "正在上传...";

        // 直接复用你原本的上传和压缩逻辑
        if (file.type === 'image/gif' || file.size <= 200 * 1024) {
            await uploadProcess(file, fileName, file.type, bgId);
        } else {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = ev => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const scale = Math.min(1, 1920 / img.width);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(blob => {
                        uploadProcess(blob, fileName, 'image/jpeg', bgId);
                    }, 'image/jpeg', 0.8);
                };
            };
        }
        btn.innerText = "✅ 上传成功";
        // 上传完延迟刷新背景显示
        setTimeout(() => { updateYearDisplayBg(); }, 1000);
    };
    i.click();
}

// 【新增函数 2】实时预览效果（不糊弹窗）
// 【修改】增强预览函数，确保它操作的是年背景
// 【完整版】预览函数：既防回跳，又确保滤镜生效
function previewYearStyle() {
    const blur = document.getElementById('yearBlurInp').value;
    const bright = document.getElementById('yearBrightInp').value;
    const alpha = document.getElementById('yearCardAlphaInp').value;
    // 如果你还没加文字颜色滑块，可以先写死一个变量，或者获取它
    const textB = document.getElementById('yearTextBrightInp')?.value || 51;

    document.getElementById('valBlur').innerText = blur;
    document.getElementById('valBright').innerText = bright;
    document.getElementById('valCardAlpha').innerText = alpha;

    // --- 核心修复：确保变量名和上面的 CSS 一一对应 ---
    const root = document.documentElement;
    root.style.setProperty('--bg-blur', blur + 'px');
    root.style.setProperty('--bg-bright', bright);
    // 注意这里：我们把透明度直接合成到背景颜色变量里
    root.style.setProperty('--year-card-bg', `rgba(255, 255, 255, ${alpha})`);
    root.style.setProperty('--year-text-color', `rgb(${textB}, ${textB}, ${textB})`);

    // 处理背景层
    const bgLayer = document.getElementById('bg-layer');
    if (bgLayer) {
        const bgId = `bg_${currentDate.getFullYear()}_year`;
        const cachedImg = localStorage.getItem(getCacheKey(bgId));
        if (cachedImg) bgLayer.style.backgroundImage = `url('${cachedImg}')`;
    }
}

// 【新增函数 3】年背景刷新逻辑
// 【修改】增强年背景显示函数
async function updateYearDisplayBg() {
    const year = currentDate.getFullYear();
    const bgId = `bg_${year}_year`;
    const configId = `bg_${year}_year_config`;
    
    try {
        // 1. 加载图片
        let s = localStorage.getItem(getCacheKey(bgId));
        if (!s) {
            const { data } = await _db.from('configs').select('value').eq('id', bgId).maybeSingle();
            if (data && data.value) {
                s = data.value;
                localStorage.setItem(getCacheKey(bgId), s);
            }
        }

        // 2. 加载模糊度和亮度配置
        let cfg = { blur: 0, brightness: 1 };
        const savedCfg = localStorage.getItem(getCacheKey(configId));
        if (savedCfg) {
            cfg = JSON.parse(savedCfg);
        } else {
            const { data: cData } = await _db.from('configs').select('value').eq('id', configId).maybeSingle();
            if (cData && cData.value) {
                cfg = JSON.parse(cData.value);
                localStorage.setItem(getCacheKey(configId), cData.value);
            }
        }

        const bgLayer = document.getElementById('bg-layer');
        if (bgLayer && s) {
            // 应用图片
            bgLayer.style.backgroundImage = `url('${s}')`;
// --- 【这里是修改/新增的逻辑】 ---
            // 应用模糊和亮度到根节点和背景层
            const blurVal = (cfg.blur || 0) + 'px';
            const brightVal = cfg.brightness || 1;
            const alphaVal = cfg.cardAlpha || 0.2;

            document.documentElement.style.setProperty('--bg-blur', blurVal);
            document.documentElement.style.setProperty('--bg-bright', brightVal);
            // 应用方块透明度变量
            document.documentElement.style.setProperty('--year-card-bg', `rgba(255, 255, 255, ${alphaVal})`);

// 同样加上强力覆盖逻辑
document.querySelectorAll('.year-month-card').forEach(card => {
    card.style.backgroundColor = `rgba(255, 255, 255, ${alphaVal})`;
});
            
            // 为了防止被覆盖，直接给 bg-layer 对象也设一遍
            bgLayer.style.setProperty('--bg-blur', blurVal);
            bgLayer.style.setProperty('--bg-bright', brightVal);
            // -------------------------------
            
            const bodyTag = document.getElementById('body-tag');
            if (bodyTag) bodyTag.classList.add('has-bg');
        }
    } catch (e) { console.log("加载年背景失败", e); }
}
// 【新增】长按年视图标题弹出设置面板
let yearLongPressTimer;

function bindYearHeaderLongPress() {
    // 假设你的年视图标题容器 ID 是 year-title 或类似，
    // 如果没有 ID，我们直接寻找显示年份的那个 h1 或 div
    const yearHeader = document.querySelector('.year-header') || document.getElementById('year-title');
    
    if (!yearHeader) {
        console.log("未找到年标题元素，请确认标题的 class 或 ID 是否匹配");
        return;
    }

    // 触摸开始（手机端）
    yearHeader.ontouchstart = () => {
        yearLongPressTimer = setTimeout(openYearAdmin, 800); // 长按 0.8 秒
    };

    // 触摸结束
    yearHeader.ontouchend = () => clearTimeout(yearLongPressTimer);

    // 鼠标按下（电脑端调试用）
    yearHeader.onmousedown = () => {
        yearLongPressTimer = setTimeout(openYearAdmin, 800);
    };

    yearHeader.onmouseup = () => clearTimeout(yearLongPressTimer);
}

// 【新增】专门负责监听长按并弹出新面板
// 【新增】利用已有的 monthDisplay 绑定长按
// 【修改】增加事件拦截，防止长按后跳回月视图
function initYearLongPress() {
    const el = document.getElementById('monthDisplay');
    if (!el) return;

    let timer;
    let isLongPress = false; // 增加一个状态锁

    const trigger = (e) => {
        if (el.innerText.includes('年 全览')) {
            isLongPress = true; // 标记现在是长按，不是普通点击
            openYearAdmin();
            // 尝试阻止事件进一步传播（防止触发原本的点击切换）
            if(e) { e.preventDefault(); e.stopPropagation(); }
        }
    };

    // 绑定触摸
    el.ontouchstart = (e) => { 
        isLongPress = false; 
        timer = setTimeout(() => trigger(e), 800); 
    };
    el.ontouchend = (e) => {
        if (isLongPress) {
            e.preventDefault(); // 如果是长按，阻止放开时的点击动作
        }
        clearTimeout(timer);
    };

    // 绑定鼠标
    el.onmousedown = (e) => { 
        isLongPress = false; 
        timer = setTimeout(() => trigger(e), 800); 
    };
    el.onmouseup = (e) => {
        if (isLongPress) {
            // 这是关键：在捕获阶段拦截接下来的 click 事件
            window.addEventListener('click', captureClick, true);
        }
        clearTimeout(timer);
    };

    function captureClick(e) {
        e.stopPropagation(); // 阻止切换月视图
        window.removeEventListener('click', captureClick, true); // 用完即拆
    }
}

// 【新增】弹出那个不糊的面板
function openYearAdmin() {
    const pass = sessionStorage.getItem('admin_temp_pass');
    if (!pass) return alert("🔒 请先解锁管理员权限");
    
    const modal = document.getElementById('year-admin-modal');
    if (modal) {
        modal.style.display = 'block';
        // 尝试从本地加载之前的模糊度和亮度，让滑块位置正确
        const year = currentDate.getFullYear();
        const saved = localStorage.getItem(getCacheKey(`bg_${year}_year_config`));
        if (saved) {
            const cfg = JSON.parse(saved);
            document.getElementById('yearBlurInp').value = cfg.blur || 0;
            document.getElementById('yearBrightInp').value = cfg.brightness || 1;
            previewYearStyle(); 
        }
    }
}

// 【关键】确保在渲染完年视图后调用初始化
// 建议把 initYearLongPress() 放在你 renderYearView 函数的最末尾
// 【新增】监听器：当背景被错误刷回月背景时，如果是年视图，强行纠正
const observer = new MutationObserver(() => {
    const el = document.getElementById('monthDisplay');
    const isYearView = el && el.innerText.includes('年 全览');
    if (isYearView) {
        // 如果文字显示是年全览，但背景不是年背景，就刷一遍
        const bgLayer = document.getElementById('bg-layer');
        const yearBgId = `bg_${currentDate.getFullYear()}_year`;
        // 检查当前背景是否包含年背景的 ID（简单判断）
        if (bgLayer && !bgLayer.style.backgroundImage.includes('_year')) {
            updateYearDisplayBg();
        }
    }
});

// 开始监听 body 类名或 monthDisplay 文字的变化
const targetNode = document.getElementById('monthDisplay');
if (targetNode) {
    observer.observe(targetNode, { childList: true, characterData: true, subtree: true });
}

// 【新增/修复】保存年背景配置
// 【修复版】确保所有变量定义正确
async function saveYearSettings() {
    // 1. 权限检查
    const pass = sessionStorage.getItem('admin_temp_pass');
    if (!pass) return alert("🔒 请先解锁管理员权限");

    try {
        // 2. 获取当前年份和滑块数值
        const year = currentDate.getFullYear();
        const blur = document.getElementById('yearBlurInp').value;
        const bright = document.getElementById('yearBrightInp').value;
        const alpha = document.getElementById('yearCardAlphaInp').value;

        // 3. 【关键修复】在此处明确定义 configId，确保后面调用时它已存在
        const configId = `bg_${year}_year_config`;
        const configValue = JSON.stringify({ 
            blur: blur, 
            brightness: bright, 
            cardAlpha: alpha 
        });

        console.log("准备保存配置:", configId, configValue);

        // 4. 调用云端存储过程
        await _db.rpc('secure_update_config_item', {
            input_password: pass,
            config_id: configId,
            new_value: configValue
        });
        
        // 5. 同步更新本地缓存
        localStorage.setItem(getCacheKey(configId), configValue);
        
        alert("✅ 年视图设置已成功保存！");
        
        // 6. 关闭弹窗并刷新显示
        document.getElementById('year-admin-modal').style.display = 'none';
        
        // 确保刷新函数存在再调用
        if (typeof updateYearDisplayBg === 'function') {
            await updateYearDisplayBg();
        }

    } catch (e) { 
        console.error("保存失败详情:", e);
        // 如果错误里包含 configId 相关的报错，说明上面的定义逻辑被跳过了
        alert("❌ 保存失败，请检查网络或权限"); 
    }
}
